function computeResult(test, answers) {
  let correct = 0, wrong = 0, skipped = 0;
  const topicStats = {};
  test.questions.forEach((q, i) => {
    const t = q.t || 'General';
    if (!topicStats[t]) topicStats[t] = { correct: 0, total: 0 };
    topicStats[t].total += 1;
    const ans = answers[i];
    if (ans === undefined) { skipped += 1; return; }
    if (ans === q.a) { correct += 1; topicStats[t].correct += 1; }
    else wrong += 1;
  });
  const topicArr = Object.entries(topicStats).map(([topic, s]) => ({
    topic, ...s, pct: s.total ? Math.round((s.correct / s.total) * 100) : 0,
  })).sort((a, b) => a.pct - b.pct);
  const score = +(correct * 1 - wrong * 0.25).toFixed(2);
  const total = test.questions.length;
  const accuracy = correct + wrong ? Math.round((correct / (correct + wrong)) * 100) : 0;
  return { correct, wrong, skipped, total, topicArr, score, accuracy };
}

async function loadJsonArray(key) {
  try {
    const raw = window.localStorage.getItem(key);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  } catch (e) {
    return [];
  }
}

async function appendToJsonArray(key, item) {
  const current = await loadJsonArray(key);
  const updated = [...current, item];
  window.localStorage.setItem(key, JSON.stringify(updated));
  return updated;
}

              })}
            </div>
            <button onClick={submitTest} style={{ width: '100%', marginTop: 12, padding: 12, borderRadius: 10, border: 'none', background: '#16a34a', color: 'white', fontWeight: 700, cursor: 'pointer' }}>
              Submit Test ({attemptedCount}/{activeTest.questions.length} done)
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ---------- RESULT ----------
  if (view === 'result' && lastResult) {
    const r = lastResult;
    const weak = r.topicArr.filter((t) => t.pct < 60);
    const strong = r.topicArr.filter((t) => t.pct >= 80);
    return (
      <div style={{ minHeight: '100vh', background: '#f4f5f7', fontFamily: "'Segoe UI', system-ui, sans-serif", padding: 16 }}>
        <div style={{ maxWidth: 720, margin: '0 auto' }}>
          <div style={{ background: NAVY, borderRadius: 14, padding: '24px 20px', color: 'white', marginBottom: 16, boxShadow: '0 4px 14px rgba(30,58,138,0.25)' }}>
            <div style={{ fontSize: 13, opacity: 0.8, letterSpacing: 1, textTransform: 'uppercase' }}>Test Result</div>
            <div style={{ fontSize: 26, fontWeight: 800, marginTop: 4 }}>{r.testTitle}</div>
            <div style={{ fontSize: 13, opacity: 0.85, marginTop: 2 }}>{r.student} · {new Date(r.timestamp).toLocaleString()}</div>
            <div style={{ display: 'flex', gap: 20, marginTop: 18, flexWrap: 'wrap' }}>
              <Stat label="Score" value={`${r.score} / ${r.total}`} />
              <Stat label="Correct" value={r.correct} color="#4ade80" />
              <Stat label="Wrong" value={r.wrong} color="#f87171" />
              <Stat label="Skipped" value={r.skipped} color="#facc15" />
              <Stat label="Accuracy" value={r.accuracy + '%'} />
            </div>
          </div>

          {error && <div style={{ background: '#fef3c7', color: '#92400e', padding: 10, borderRadius: 8, fontSize: 13, marginBottom: 12 }}>{error}</div>}

          <SectionTitle>Topic-wise Weak Area Analysis</SectionTitle>
          <div style={{ background: 'white', borderRadius: 12, padding: '14px 16px', marginBottom: 16, boxShadow: '0 1px 4px rgba(0,0,0,0.06)' }}>
            {r.topicArr.map((t) => (
              <div key={t.topic} style={{ marginBottom: 12 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 14, marginBottom: 4 }}>
                  <span style={{ fontWeight: 600, color: '#1f2937' }}>{t.topic}</span>
                  <span style={{ color: t.pct < 60 ? '#dc2626' : t.pct < 80 ? '#ca8a04' : '#16a34a', fontWeight: 700 }}>{t.correct}/{t.total} ({t.pct}%)</span>
                </div>
                <div style={{ height: 8, background: '#e5e7eb', borderRadius: 6, overflow: 'hidden' }}>
                  <div style={{ height: '100%', width: t.pct + '%', background: t.pct < 60 ? '#dc2626' : t.pct < 80 ? '#eab308' : '#16a34a', borderRadius: 6 }} />
                </div>
              </div>
            ))}
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 20 }}>
            <div style={{ background: '#fef2f2', border: '1px solid #fecaca', borderRadius: 12, padding: 14 }}>
              <div style={{ fontWeight: 700, color: '#b91c1c', marginBottom: 6, fontSize: 14 }}>⚠️ Weak Areas</div>
              {weak.length === 0 ? <div style={{ fontSize: 13, color: '#6b7280' }}>None — solid work!</div> : weak.map((t) => <div key={t.topic} style={{ fontSize: 13, color: '#7f1d1d' }}>• {t.topic} ({t.pct}%)</div>)}
            </div>
            <div style={{ background: '#f0fdf4', border: '1px solid #bbf7d0', borderRadius: 12, padding: 14 }}>
              <div style={{ fontWeight: 700, color: '#15803d', marginBottom: 6, fontSize: 14 }}>✅ Strong Areas</div>
              {strong.length === 0 ? <div style={{ fontSize: 13, color: '#6b7280' }}>Keep practicing.</div> : strong.map((t) => <div key={t.topic} style={{ fontSize: 13, color: '#14532d' }}>• {t.topic} ({t.pct}%)</div>)}
            </div>
          </div>

          <div style={{ display: 'flex', gap: 10, marginBottom: 30 }}>
            <button onClick={() => { setView('dashboard'); setTab('leaderboard'); setLbTestId(r.testId); }} style={{ flex: 1, padding: 13, borderRadius: 10, border: `1.5px solid ${NAVY}`, background: 'white', color: NAVY, fontWeight: 700, cursor: 'pointer' }}>View Leaderboard</button>
            <button onClick={() => { setView('dashboard'); setTab('tests'); }} style={{ flex: 1, padding: 13, borderRadius: 10, border: 'none', background: NAVY, color: 'white', fontWeight: 700, cursor: 'pointer' }}>Dashboard</button>
          </div>
        </div>
      </div>
    );
  }

  // ---------- DASHBOARD ----------
  return (
    <div style={{ minHeight: '100vh', background: '#f4f5f7', fontFamily: "'Segoe UI', system-ui, sans-serif", paddingBottom: 70 }}>
      <div style={{ background: NAVY, color: 'white', padding: '16px 16px 14px' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <Logo size={36} />
            <div>
              <div style={{ fontSize: 15, fontWeight: 800 }}>{APP_NAME}</div>
              <div style={{ fontSize: 11.5, opacity: 0.75 }}>{student}</div>
            </div>
          </div>
          <button onClick={() => { setStudent(null); setView('login'); setNameInput(''); }} style={{ background: 'rgba(255,255,255,0.15)', color: 'white', border: 'none', borderRadius: 8, padding: '7px 12px', fontSize: 12.5, fontWeight: 600, cursor: 'pointer' }}>Logout</button>
        </div>
      </div>

      <div style={{ maxWidth: 720, margin: '0 auto', padding: 16 }}>
        {loading && <div style={{ textAlign: 'center', color: '#6b7280', fontSize: 13, marginBottom: 10 }}>Loading...</div>}
        {error && <div style={{ background: '#fef3c7', color: '#92400e', padding: 10, borderRadius: 8, fontSize: 13, marginBottom: 12 }}>{error} <button onClick={refreshAll} style={{ marginLeft: 8, background: 'none', border: 'none', color: NAVY, fontWeight: 700, cursor: 'pointer' }}>Retry</button></div>}
        {saveMsg && tab === 'tests' && <div style={{ background: '#dcfce7', color: '#166534', padding: 10, borderRadius: 8, fontSize: 13, marginBottom: 12 }}>{saveMsg} <button onClick={() => setSaveMsg(null)} style={{ marginLeft: 8, background: 'none', border: 'none', color: '#166534', fontWeight: 700, cursor: 'pointer' }}>✕</button></div>}

        {tab === 'tests' && (
          <>
            <SectionTitle>Available Tests</SectionTitle>
            {allTests.map((t) => {
              const best = bestScoreForTest(t.id);
              return (
                <div key={t.id} style={{ background: 'white', borderRadius: 14, padding: 16, marginBottom: 12, boxShadow: '0 1px 6px rgba(0,0,0,0.06)' }}>
                  <div style={{ fontSize: 16, fontWeight: 700, color: '#111827' }}>{t.title}</div>
                  <div style={{ fontSize: 12.5, color: '#6b7280', marginBottom: 10 }}>{t.subtitle} · {t.questions.length} questions</div>
                  {best !== null && <div style={{ fontSize: 12.5, color: '#16a34a', fontWeight: 600, marginBottom: 10 }}>Your best score: {best} / {t.questions.length}</div>}
                  <button onClick={() => startTest(t)} style={{ width: '100%', padding: 12, borderRadius: 10, border: 'none', background: NAVY, color: 'white', fontWeight: 700, cursor: 'pointer' }}>
                    {best !== null ? 'Retake Test' : 'Start Test'}
                  </button>
                </div>
              );
            })}
          </>
        )}

        {tab === 'leaderboard' && (
          <>
            <SectionTitle>Leaderboard</SectionTitle>
            <select value={lbTestId} onChange={(e) => setLbTestId(e.target.value)}
              style={{ width: '100%', padding: 10, borderRadius: 10, border: '1.5px solid #d1d5db', marginBottom: 14, fontSize: 14, background: 'white' }}>
              {allTests.map((t) => <option key={t.id} value={t.id}>{t.title}</option>)}
            </select>
            <div style={{ background: 'white', borderRadius: 14, padding: 8, boxShadow: '0 1px 6px rgba(0,0,0,0.06)' }}>
              {leaderboardForTest(lbTestId).length === 0 && !loading && (
                <div style={{ padding: 20, textAlign: 'center', color: '#6b7280', fontSize: 13.5 }}>No attempts yet. Be the first to take this test!</div>
              )}
              {leaderboardForTest(lbTestId).map((a, idx, arr) => {
                const isMe = a.student === student;
                const medal = idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : null;
                return (
                  <div key={a.student} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '12px 10px', borderBottom: idx < arr.length - 1 ? '1px solid #f0f0f0' : 'none', background: isMe ? '#eef2ff' : 'transparent', borderRadius: 8 }}>
                    <div style={{ width: 28, textAlign: 'center', fontWeight: 800, color: '#6b7280', fontSize: 14 }}>{medal || `#${idx + 1}`}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 700, fontSize: 14, color: '#111827' }}>{a.student}{isMe && <span style={{ color: NAVY }}> (You)</span>}</div>
                      <div style={{ fontSize: 11.5, color: '#9ca3af' }}>{new Date(a.timestamp).toLocaleDateString()}</div>
                    </div>
                    <div style={{ textAlign: 'right' }}>
                      <div style={{ fontWeight: 800, color: NAVY, fontSize: 15 }}>{a.score}</div>
                      <div style={{ fontSize: 11, color: '#6b7280' }}>{a.accuracy}% acc</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </>
        )}

        {tab === 'history' && (
          <>
            <SectionTitle>Your Attempt History</SectionTitle>
            {myAttempts.length === 0 && !loading && (
              <div style={{ background: 'white', borderRadius: 14, padding: 24, textAlign: 'center', color: '#6b7280', fontSize: 13.5, boxShadow: '0 1px 6px rgba(0,0,0,0.06)' }}>
                No attempts yet. Go take a test!
              </div>
            )}
            {myAttempts.map((a) => {
              const isOpen = expandedHistoryId === a.id;
              return (
                <div key={a.id} style={{ background: 'white', borderRadius: 14, marginBottom: 10, boxShadow: '0 1px 6px rgba(0,0,0,0.06)', overflow: 'hidden' }}>
                  <button onClick={() => setExpandedHistoryId(isOpen ? null : a.id)} style={{ width: '100%', textAlign: 'left', padding: 14, background: 'none', border: 'none', cursor: 'pointer', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <div>
                      <div style={{ fontWeight: 700, fontSize: 14.5, color: '#111827' }}>{a.testTitle}</div>
                      <div style={{ fontSize: 11.5, color: '#9ca3af' }}>{new Date(a.timestamp).toLocaleString()}</div>
                    </div>
                    <div style={{ textAlign: 'right' }}>
                      <div style={{ fontWeight: 800, color: NAVY, fontSize: 16 }}>{a.score}</div>
                      <div style={{ fontSize: 11, color: '#6b7280' }}>{isOpen ? 'Hide ▲' : 'Details ▼'}</div>
                    </div>
                  </button>
                  {isOpen && (
                    <div style={{ padding: '0 14px 14px' }}>
                      <div style={{ display: 'flex', gap: 14, fontSize: 12.5, color: '#374151', marginBottom: 10 }}>
                        <span>✅ {a.correct}</span><span>❌ {a.wrong}</span><span>⏭ {a.skipped}</span><span>🎯 {a.accuracy}%</span>
                      </div>
                      {a.topicArr.map((t) => (
                        <div key={t.topic} style={{ marginBottom: 8 }}>
                          <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12.5 }}>
                            <span style={{ color: '#374151' }}>{t.topic}</span>
                            <span style={{ color: t.pct < 60 ? '#dc2626' : '#16a34a', fontWeight: 600 }}>{t.pct}%</span>
                          </div>
                          <div style={{ height: 6, background: '#e5e7eb', borderRadius: 4, overflow: 'hidden' }}>
                            <div style={{ height: '100%', width: t.pct + '%', background: t.pct < 60 ? '#dc2626' : '#16a34a' }} />
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </>
        )}

        {tab === 'create' && (
          <>
            <SectionTitle>Create a New Quiz</SectionTitle>
            <div style={{ background: 'white', borderRadius: 14, padding: 16, marginBottom: 14, boxShadow: '0 1px 6px rgba(0,0,0,0.06)' }}>
              <label style={FieldLabel}>Quiz Title</label>
              <input value={newQuizTitle} onChange={(e) => setNewQuizTitle(e.target.value)} placeholder="e.g. Tenses Practice" style={FieldInput} />
              <label style={FieldLabel}>Subtitle (optional)</label>
              <input value={newQuizSubtitle} onChange={(e) => setNewQuizSubtitle(e.target.value)} placeholder="e.g. Chapter 3 Revision" style={FieldInput} />
            </div>

            {newQuestions.map((qq, idx) => (
              <div key={idx} style={{ background: 'white', borderRadius: 14, padding: 16, marginBottom: 12, boxShadow: '0 1px 6px rgba(0,0,0,0.06)' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                  <div style={{ fontWeight: 700, fontSize: 13.5, color: '#374151' }}>Question {idx + 1}</div>
                  {newQuestions.length > 1 && (
                    <button onClick={() => removeQuestionRow(idx)} style={{ background: 'none', border: 'none', color: '#dc2626', fontSize: 12.5, fontWeight: 600, cursor: 'pointer' }}>Remove</button>
                  )}
                </div>
                <label style={FieldLabel}>Question text</label>
                <textarea value={qq.qText} onChange={(e) => updateQField(idx, 'qText', e.target.value)} rows={2} placeholder="Type the question..." style={{ ...FieldInput, resize: 'vertical' }} />
                <label style={FieldLabel}>Topic / category (optional)</label>
                <input value={qq.topic} onChange={(e) => updateQField(idx, 'topic', e.target.value)} placeholder="e.g. Verb, Grammar, History..." style={FieldInput} />
                <label style={FieldLabel}>Options (tap ⬤ to mark the correct one)</label>
                {qq.opts.map((opt, oi) => (
                  <div key={oi} style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
                    <button onClick={() => setQCorrect(idx, oi)} style={{
                      width: 22, height: 22, borderRadius: '50%', flexShrink: 0, cursor: 'pointer',
                      border: qq.correct === oi ? '2px solid #16a34a' : '2px solid #d1d5db',
                      background: qq.correct === oi ? '#16a34a' : 'white',
                    }} title="Mark as correct" />
                    <input value={opt} onChange={(e) => updateQOption(idx, oi, e.target.value)} placeholder={`Option ${String.fromCharCode(97 + oi)}`} style={{ ...FieldInput, marginBottom: 0, flex: 1 }} />
                  </div>
                ))}
              </div>
            ))}

            <button onClick={addQuestionRow} style={{ width: '100%', padding: 12, borderRadius: 10, border: `1.5px dashed ${NAVY}`, background: 'white', color: NAVY, fontWeight: 700, cursor: 'pointer', marginBottom: 14 }}>+ Add Another Question</button>

            {!isQuizValid && <div style={{ fontSize: 12, color: '#9ca3af', marginBottom: 10, textAlign: 'center' }}>Fill title, question text, all 4 options, and mark a correct answer for each question.</div>}
            <button onClick={saveNewQuiz} disabled={!isQuizValid}
              style={{ width: '100%', padding: 13, borderRadius: 10, border: 'none', background: isQuizValid ? '#16a34a' : '#cbd5e1', color: 'white', fontWeight: 700, cursor: isQuizValid ? 'pointer' : 'not-allowed', marginBottom: 30 }}>
              Publish Quiz
            </button>
          </>
        )}
      </div>

      <div style={{ position: 'fixed', bottom: 0, left: 0, right: 0, background: 'white', borderTop: '1px solid #e5e7eb', display: 'flex', boxShadow: '0 -2px 10px rgba(0,0,0,0.06)' }}>
        {[
          { key: 'tests', label: 'Tests', icon: '📝' },
          { key: 'create', label: 'Add Quiz', icon: '➕' },
          { key: 'leaderboard', label: 'Leaderboard', icon: '🏆' },
          { key: 'history', label: 'History', icon: '📊' },
        ].map((item) => (
          <button key={item.key} onClick={() => setTab(item.key)} style={{ flex: 1, padding: '10px 0', background: 'none', border: 'none', cursor: 'pointer', color: tab === item.key ? NAVY : '#9ca3af', fontWeight: tab === item.key ? 700 : 500 }}>
            <div style={{ fontSize: 18 }}>{item.icon}</div>
            <div style={{ fontSize: 10.5, marginTop: 2 }}>{item.label}</div>
          </button>
        ))}
      </div>
    </div>
  );
}

const FieldLabel = { display: 'block', fontSize: 12, color: '#6b7280', fontWeight: 600, marginBottom: 4, marginTop: 8 };
const FieldInput = { width: '100%', padding: '10px 12px', borderRadius: 8, border: '1.5px solid #d1d5db', fontSize: 14, marginBottom: 4, boxSizing: 'border-box', fontFamily: 'inherit' };

function Stat({ label, value, color }) {
  return (
    <div>
      <div style={{ fontSize: 11, opacity: 0.75, textTransform: 'uppercase', letterSpacing: 0.5 }}>{label}</div>
      <div style={{ fontSize: 22, fontWeight: 800, color: color || 'white' }}>{value}</div>
    </div>
  );
}

function SectionTitle({ children }) {
  return <div style={{ fontSize: 14, fontWeight: 700, color: '#374151', margin: '4px 0 10px', letterSpacing: 0.3 }}>{children}</div>;
}

/* ==== APP CODE END ==== */

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
